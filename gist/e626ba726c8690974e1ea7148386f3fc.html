          <h1>Run SSH on WSL2</h1>
          <p>
            Tags:

            <a class="collection" href="/tags/wsl">wsl</a>

            <a class="collection" href="/tags/ssh">ssh</a>
          </p>
          <noscript>
            <pre>
The goal is to share the Windows OpenSSH service located in `C:\Windows\System32\OpenSSH` to WSL2.

Adapted from: https://github.com/rupor-github/wsl-ssh-agent#wsl-2-compatibility

Build npiperelay in Windows:

```
winget install GoLang.Go
go install -v -x github.com/jstarks/npiperelay@v0.1.0
```
 
Link it from WSL + install socat:

```
sudo ln -s /mnt/c/Users/tomas/go/bin/npiperelay.exe /usr/local/bin/npiperelay.exe
sudo apt install socat

mkdir ~/.ssh
```

Add the following to `.bashrc`:

```bash
export SSH_AUTH_SOCK=$HOME/.ssh/agent.sock
ss -a | grep -q $SSH_AUTH_SOCK
if [ $? -ne 0   ]; then
    rm -f $SSH_AUTH_SOCK
    ( setsid socat UNIX-LISTEN:$SSH_AUTH_SOCK,fork EXEC:&quot;npiperelay.exe -ei -s //./pipe/openssh-ssh-agent&quot;,nofork &amp; ) &gt;/dev/null 2&gt;&amp;1
fi
```</pre
