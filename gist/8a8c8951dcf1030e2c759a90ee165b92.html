## Install Mega cmd

Add the Mega repository in wsl sources, create `/etc/apt/sources.list.d/megasync.list`:

```
deb https://mega.nz/linux/MEGAsync/xUbuntu_20.04/ ./
```

Import key and install:

```
wget -O - https://mega.nz/linux/MEGAsync/xUbuntu_20.04/Release.key | sudo apt-key add -

sudo apt update
sudo apt install megacmd
```

Create unlocker binary in `/usr/local/bin/mega-unlock`:

```
#!/usr/bin/bash

read -s pass
mega-login &lt;username&gt; $pass
unset pass
```

Run it and enter the Mega password:

```
chmod +x /usr/local/bin/mega-unlock
mega-unlock
```

## Setup backup

Prepare backup directories and set up sync:

```
mega-mkdir wsl
mkdir sync
mega-sync sync wsl
```

Create backup script `backup.sh`:

```
#!/usr/bin/bash
zip -r -9 sync/backup.zip . -x &quot;/.*&quot; -x &quot;/sync/*&quot;
```

## Remove Mega autocompletion

This seems to be a bug in WSL, seems to slow down startup of each instance. Remove `/etc/bash_completion.d/megacmd_completion.sh` to fix.</pre
