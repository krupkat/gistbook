          <h1>C++20 concepts for testing</h1>
          <p>
            Tags:

            <a class="collection" href="/gistbook/tags/c-20">c++20</a>

            <a class="collection" href="/gistbook/tags/concepts">concepts</a>
          </p>
          <noscript>
            <pre>
When you&#39;d like to write a test that checks whether a piece of code compiles with given template parameters, use concepts:

```
template&lt;typename T, typename U&gt;
concept Addable = requires (T a, U b) {
    a + b;
};

REQUIRE(Addable&lt;std::vector&lt;float&gt;, int&gt;)
```

However this doesn&#39;t always work, see the included example.

The catch is when there is a function in the _immediate context_ that takes the two parameters `[1]`, but doesn&#39;t compile down the line. 
A remedy is to add an explicit requirement to this function `[2]`.

Demo: https://godbolt.org/z/5WM7denjK

Related discussion: https://stackoverflow.com/questions/70940008/concept-requirement-and-non-immediate-context</pre
