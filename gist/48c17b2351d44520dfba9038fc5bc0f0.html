          <h1>Setup Windows 11</h1>

            <pre>
# WSL

Install WSL:

```
wsl --install
```

Launch Ubuntu and install basics:

```
sudo apt install git build-essential python3 python-is-python3 
```

Follow https://apt.kitware.com/ to add `cmake` repository.

# Windows

For Ryzen CPUs:

 - Check https://www.amd.com/en/support/kb/faq/pa-400
 - Install [AMD Chipset Software 3.10.08.506](https://www.amd.com/en/support/kb/release-notes/rn-ryzen-chipset-3-10-08-506) (or newer)

Enable Core isolation:

 - Settings -&gt; Search &quot;Core isolation&quot; -&gt; Enable Memory integrity

Set Windows Terminal defaults:

 - Windows Terminal -&gt; Settings -&gt; Default Terminal Application -&gt; Windows Terminal
 - Windows Terminal -&gt; Settings -&gt; Profiles -&gt; Ubuntu -&gt; Starting directory -&gt; /home/tom

Install VS build tools: https://visualstudio.microsoft.com/cs/downloads/#build-tools-for-visual-studio-2022

Install apps through `winget`:

```
winget install Altap.Salamander
winget install GIMP.GIMP
winget install Git.Git
winget install GoLang.Go
winget install hackjutsu.Lepton
winget install IrfanSkiljan.IrfanView
winget install Kitware.CMake
winget install Microsoft.VisualStudioCode
winget install Python.Python.3
winget install -i TheDocumentFoundation.LibreOffice
winget install VideoLAN.VLC
```

# SSH

## Windows

Install OpenSSH:

- Check if `C:\Windows\System32\OpenSSH` exists
- If not, install through Settings -&gt; Add optional featuree -&gt; OpenSSH client

Autorun on startup:

  - Services -&gt; OpenSSH Authentication Agent -&gt; Startup type -&gt; Automatic

Add your keys with `ssh-add`

## WSL

Follow [SSH on WSL](https://gist.github.com/krupkat/e626ba726c8690974e1ea7148386f3fc)

# Git

In Windows point Git to use the Windows OpenSSH client:

 - add environment variable `GIT_SSH=C:\Windows\System32\OpenSSH\ssh.exe`

Both in Windows and WSL:

```
git config --global user.name &quot;Your Name&quot;
git config --global user.email ID+username@users.noreply.github.com
```

# VS Code

Follow [VS Code setup](https://gist.github.com/krupkat/72a675bfb16244fe887ac77eb2b0fdfa)</pre
